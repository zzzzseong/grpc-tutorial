// payment.proto — 결제 서버(payment-server)가 "제공하는" 서비스 계약서.
//
// order-server가 이 proto로 코드를 생성해 "PaymentService 클라이언트 스텁"을
// 만들어 결제를 요청합니다.

syntax = "proto3";

package payment;

option go_package = "grpc-tutorial/gen/paymentpb";

service PaymentService {
  // order-server가 주문 생성 시 결제를 요청하려고 호출.
  rpc ProcessPayment(ProcessPaymentRequest) returns (ProcessPaymentReply);

  // [2단계: Server Streaming]
  // returns 앞의 `stream` 키워드가 핵심입니다.
  // 요청은 1개지만, 응답은 연결이 열린 채로 여러 개가 순서대로 흘러옵니다.
  // 결제가 진행되는 동안 중간 상태를 실시간으로 알려줄 수 있습니다.
  rpc ProcessPaymentStream(ProcessPaymentRequest) returns (stream PaymentProgress);
}

message ProcessPaymentRequest {
  string order_id = 1;
  int32 amount = 2;
}

message ProcessPaymentReply {
  bool approved = 1;
  string transaction_id = 2;
}

// 스트림으로 흘려보낼 결제 진행 상황 한 조각.
message PaymentProgress {
  string stage = 1;          // VALIDATING → AUTHORIZING → APPROVED
  string transaction_id = 2; // APPROVED 단계에서만 채워짐
}
